name: Build

on:
  push:
    branches: ["*"]
    tags: ["*"]
    paths-ignore:
      - "configs/**"
      - "README.md"
  pull_request:
    branches: ["*"]
    paths-ignore:
      - "configs/**"
      - "README.md"

jobs:
  build-linux:
    name: Linux
    runs-on: ubuntu-latest
    container:
      image: registry.gitlab.steamos.cloud/steamrt/sniper/sdk:latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          submodules: false
          fetch-depth: 0

      - name: Init submodules
        shell: bash
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git submodule update --init --recursive metamod-source hl2sdk-cs2
          git submodule update --init

      - name: Install dependencies
        run: |
          git config --global --add safe.directory $GITHUB_WORKSPACE
          apt-get update -y
          apt-get install -y python3 python3-pip
          git clone https://github.com/alliedmodders/ambuild.git
          pip3 install ./ambuild

      - name: Configure
        run: |
          mkdir -p build && cd build
          python3 ../configure.py \
            --sdks cs2 \
            --targets x86_64 \
            --mms_path ../metamod-source \
            --hl2sdk-manifests ../metamod-source/hl2sdk-manifests \
            --enable-optimize

      - name: Build
        working-directory: build
        run: ambuild

      - name: Stage package
        run: |
          mkdir -p staging/addons
          cp -r build/package/addons/* staging/addons/
          mkdir -p staging/cfg/cs2menus
          cp configs/core.cfg staging/cfg/cs2menus/

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: cs2menus-linux
          path: staging

  build-windows:
    name: Windows
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          submodules: false

      - name: Init submodules
        shell: bash
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git submodule update --init --recursive metamod-source hl2sdk-cs2
          git submodule update --init

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Set up MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: amd64

      - name: Install AMBuild
        run: |
          git clone https://github.com/alliedmodders/ambuild.git
          pip install ./ambuild

      - name: Configure
        run: |
          mkdir -Force build | Out-Null; cd build
          python ../configure.py `
            --sdks cs2 `
            --targets x86_64 `
            --mms_path ../metamod-source `
            --hl2sdk-manifests ../metamod-source/hl2sdk-manifests `
            --enable-optimize

      - name: Build
        working-directory: build
        run: ambuild

      - name: Stage package
        run: |
          New-Item -ItemType Directory -Force -Path staging/addons | Out-Null
          Copy-Item -Recurse build/package/addons/* staging/addons/
          New-Item -ItemType Directory -Force -Path staging/cfg/cs2menus | Out-Null
          Copy-Item configs/core.cfg staging/cfg/cs2menus/

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: cs2menus-windows
          path: staging

  build-bridges:
    name: Bridges (.NET)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Build SwiftlyS2 bridge
        run: >-
          dotnet publish bridges/swiftly/SwiftlyS2.Cs2Menus/SwiftlyS2.Cs2Menus.csproj
          -c Release -o build-swiftly

      - name: Build CounterStrikeSharp bridge
        run: >-
          dotnet publish bridges/counterstrikesharp/CounterStrikeSharp.Cs2Menus/CounterStrikeSharp.Cs2Menus.csproj
          -c Release -o build-css

      # SwiftlyS2: shared libs are loaded as "exports" from a plugin's resources/exports folder.
      - name: Stage SwiftlyS2 package
        run: |
          dest=staging-swiftly/addons/swiftlys2/plugins/SwiftlyS2.Cs2Menus
          mkdir -p "$dest/resources/exports"
          cp build-swiftly/SwiftlyS2.Cs2Menus.dll "$dest/resources/exports/"
          cp bridges/README.md "$dest/README.md"

      # CounterStrikeSharp: shared APIs live in addons/counterstrikesharp/shared/<Name>/<Name>.dll.
      - name: Stage CounterStrikeSharp package
        run: |
          dest=staging-css/addons/counterstrikesharp/shared/CounterStrikeSharp.Cs2Menus
          mkdir -p "$dest"
          cp build-css/CounterStrikeSharp.Cs2Menus.dll "$dest/"
          cp bridges/README.md "$dest/README.md"

      - name: Upload SwiftlyS2 bridge artifact
        uses: actions/upload-artifact@v7
        with:
          name: cs2menus-swiftly-bridge
          path: staging-swiftly

      - name: Upload CounterStrikeSharp bridge artifact
        uses: actions/upload-artifact@v7
        with:
          name: cs2menus-css-bridge
          path: staging-css

  build-examples:
    name: Examples (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: linux
            runner: ubuntu-latest
          - os: windows
            runner: windows-latest
    runs-on: ${{ matrix.runner }}
    container: ${{ matrix.os == 'linux' && 'registry.gitlab.steamos.cloud/steamrt/sniper/sdk:latest' || '' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          submodules: false
          fetch-depth: 0

      - name: Init submodules
        shell: bash
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git submodule update --init --recursive metamod-source hl2sdk-cs2
          git submodule update --init

      - name: Install dependencies (Linux)
        if: matrix.os == 'linux'
        run: |
          git config --global --add safe.directory $GITHUB_WORKSPACE
          apt-get update -y
          apt-get install -y python3 python3-pip zip
          git clone https://github.com/alliedmodders/ambuild.git
          pip3 install ./ambuild

      - name: Set up Python (Windows)
        if: matrix.os == 'windows'
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Set up MSVC (Windows)
        if: matrix.os == 'windows'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: amd64

      - name: Install AMBuild (Windows)
        if: matrix.os == 'windows'
        run: |
          git clone https://github.com/alliedmodders/ambuild.git
          pip install ./ambuild

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Configure metamod example (Linux)
        if: matrix.os == 'linux'
        env:
          CS2MENUS_BUILD_EXAMPLES: "1"
        run: |
          mkdir -p build && cd build
          python3 ../configure.py \
            --sdks cs2 \
            --targets x86_64 \
            --mms_path ../metamod-source \
            --hl2sdk-manifests ../metamod-source/hl2sdk-manifests \
            --enable-optimize

      - name: Configure metamod example (Windows)
        if: matrix.os == 'windows'
        env:
          CS2MENUS_BUILD_EXAMPLES: "1"
        run: |
          mkdir -Force build | Out-Null; cd build
          python ../configure.py `
            --sdks cs2 `
            --targets x86_64 `
            --mms_path ../metamod-source `
            --hl2sdk-manifests ../metamod-source/hl2sdk-manifests `
            --enable-optimize

      - name: Build metamod example
        working-directory: build
        run: ambuild

      - name: Build .NET examples
        run: |
          dotnet build examples/swiftly/Cs2MenusSwiftlyExample.csproj -c Release -o build-example-swiftly
          dotnet build examples/counterstrikesharp/Cs2MenusCssExample.csproj -c Release -o build-example-css

      - name: Stage examples (Linux)
        if: matrix.os == 'linux'
        run: |
          # Metamod native consumer: addons/<name>/bin/<platform>/<name>.so + vdf.
          bindir=staging/addons/cs2menus_consumer/bin/linuxsteamrt64
          mkdir -p "$bindir" staging/addons/metamod
          src=$(find build -name 'cs2menus_consumer.*.so' -type f | head -n1)
          cp "$src" "$bindir/cs2menus_consumer.so"
          printf '"Metamod Plugin"\n{\n\t"alias"\t"cs2menus_consumer"\n\t"file"\t"addons/cs2menus_consumer/bin/linuxsteamrt64/cs2menus_consumer"\n}\n' > staging/addons/metamod/cs2menus_consumer.vdf
          # .NET example plugins, each in its host's plugin folder.
          mkdir -p staging/addons/swiftlys2/plugins/Cs2MenusSwiftlyExample
          mkdir -p staging/addons/counterstrikesharp/plugins/Cs2MenusCssExample
          cp -r build-example-swiftly/* staging/addons/swiftlys2/plugins/Cs2MenusSwiftlyExample/
          cp -r build-example-css/* staging/addons/counterstrikesharp/plugins/Cs2MenusCssExample/

      - name: Stage examples (Windows)
        if: matrix.os == 'windows'
        run: |
          $bindir = "staging/addons/cs2menus_consumer/bin/win64"
          New-Item -ItemType Directory -Force -Path $bindir, staging/addons/metamod | Out-Null
          $src = Get-ChildItem -Path build -Recurse -Filter 'cs2menus_consumer.*.dll' -File | Select-Object -First 1
          Copy-Item $src.FullName "$bindir/cs2menus_consumer.dll"
          $vdf = @(
            '"Metamod Plugin"',
            '{',
            "`t`"alias`"`t`"cs2menus_consumer`"",
            "`t`"file`"`t`"addons/cs2menus_consumer/bin/win64/cs2menus_consumer`"",
            '}'
          ) -join "`n"
          Set-Content -Path staging/addons/metamod/cs2menus_consumer.vdf -Value $vdf
          New-Item -ItemType Directory -Force -Path staging/addons/swiftlys2/plugins/Cs2MenusSwiftlyExample, staging/addons/counterstrikesharp/plugins/Cs2MenusCssExample | Out-Null
          Copy-Item -Recurse build-example-swiftly/* staging/addons/swiftlys2/plugins/Cs2MenusSwiftlyExample/
          Copy-Item -Recurse build-example-css/* staging/addons/counterstrikesharp/plugins/Cs2MenusCssExample/

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: cs2menus-examples-${{ matrix.os }}
          path: staging

  release:
    name: Release
    if: startsWith(github.ref, 'refs/tags/')
    needs: [build-linux, build-windows, build-bridges]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download Linux artifact
        uses: actions/download-artifact@v8
        with:
          name: cs2menus-linux
          path: cs2menus-linux

      - name: Download Windows artifact
        uses: actions/download-artifact@v8
        with:
          name: cs2menus-windows
          path: cs2menus-windows

      - name: Download SwiftlyS2 bridge artifact
        uses: actions/download-artifact@v8
        with:
          name: cs2menus-swiftly-bridge
          path: cs2menus-swiftly-bridge

      - name: Download CounterStrikeSharp bridge artifact
        uses: actions/download-artifact@v8
        with:
          name: cs2menus-css-bridge
          path: cs2menus-css-bridge

      - name: Create archives
        run: |
          cd cs2menus-linux && zip -r ../cs2menus-${{ github.ref_name }}-linux.zip . && cd ..
          cd cs2menus-windows && zip -r ../cs2menus-${{ github.ref_name }}-windows.zip . && cd ..
          cd cs2menus-swiftly-bridge && zip -r ../cs2menus-swiftly-bridge-${{ github.ref_name }}.zip . && cd ..
          cd cs2menus-css-bridge && zip -r ../cs2menus-css-bridge-${{ github.ref_name }}.zip . && cd ..

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            cs2menus-${{ github.ref_name }}-linux.zip
            cs2menus-${{ github.ref_name }}-windows.zip
            cs2menus-swiftly-bridge-${{ github.ref_name }}.zip
            cs2menus-css-bridge-${{ github.ref_name }}.zip
          generate_release_notes: true
