// CS2 Menu API - Configuration
// Place this file at: <game_root>/cfg/cs2menus/core.cfg
// Reloaded automatically on every map change.

"cs2menus"
{
    "General"
    {
        // Characters a player may type in front of a menu selection number.
        // Bare numbers always work; these let "!1" / "/1" select item 1 too.
        // CommandPrefix is for commands meant to stay visible in chat,
        // SilentCommandPrefix for ones that should be hidden.
        "CommandPrefix"         "!"
        "SilentCommandPrefix"   "/"
    }

    "Menu"
    {
        // Default render style for menus.
        //   "chat" - numbered list in chat, select by typing the number.
        //   "html" - center-screen HTML panel, navigate with movement keys.
        "DefaultType"           "html"

		// Built-in labels (Exit, page nav, footer hints) translation language
        // This is the fallback language when a client's language is unknown or a phrase file lacks it.
        "DefaultLanguage"       "en"

        // Default state of the "0. Exit" entry on new menus (1 = shown, 0 = hidden).
        // Consumers can still override this per-menu in code.
        "ExitButton"            "1"

		// --- CHAT menus ---

		// Items shown per page in a chat menu (1-7).
        // The remaining keys are reserved: 8 = Next page, 9 = Previous page, 0 = Exit.
        "ItemsPerPage"          "7"

        // Chat line colors, by NAME (chat only has the fixed client palette, not hex).
        // Names: default, darkred, purple, green, olive, lime, red, grey, yellow,
        //        bluegrey, blue, darkblue, grey2, orchid, lightred, gold. Unknown keeps the default.
        "ChatTitleColor"        "orchid"  // title text + decoration
        "ChatPageColor"         "default" // the "(page x/y)" indicator
        "ChatItemColor"         "default" // enabled item number + text
        "ChatDisabledColor"     "grey"    // disabled item line
        "ChatArrowColor"        "orchid"  // Next/Prev/Exit arrow + label
        "ChatHeaderColor"       "default" // the optional header line

        // Chat decoration text.
        "ChatTitlePrefix"       "-- "     // before the title
        "ChatTitleSuffix"       " --"     // after the title (and page indicator)
        "ChatNumberPrefix"      "#"       // before an item's selection number
        "ChatNumberSuffix"      " "       // between the number and the text
        "ChatDisabledPrefix"    "#"       // replaces the number prefix on disabled rows
        "ChatArrow"             "-> "     // before Next/Prev/Exit labels
        "ChatPagePrefix"        "(page "
        "ChatPageSuffix"        ")"
        "ChatShowPage"          "1"       // show "(page x/y)" on multi-page menus (0 = hide)

        // Optional branded line printed above the title. Empty = none.
        "ChatHeader"            ""

        // --- HTML menus ---

        // Rows visible at once in an HTML menu (scrolling window, 1-20).
        // HTML scrolls with movement keys, so it isn't limited to the 7 chat keys.
        "HtmlVisibleItems"      "7"

        // Show a selectable "Exit" row at the bottom of HTML menus (1 = on, 0 = off).
        // Auto-forced on anyway when NavBack is "none", so a menu is never stuck.
        "HtmlExitItem"          "0"

        // Hex colors for the HTML markup.
        "HtmlNavColor"          "#ff2ee7"  // highlighted/selected row + cursor
        "HtmlFooterColor"       "#909090"  // key-hint footer line
        "HtmlDisabledColor"     "#808080"  // greyed-out items
        "HtmlTitleColor"        "#ff00e1"  // title accent line
        "HtmlItemColor"         "#FFFFFF"  // normal (unselected) item text

        // Text size of the title and the item rows.
        // Tokens, smallest to largest: xs, s, sm, m, ml, l, xl, xxl, xxxl.
        // Unknown values keep the default.
        "HtmlTitleSize"         "l"
        "HtmlItemSize"          "sm"

        // Line alignment in the panel: left, center, or right.
        "HtmlAlign"             "center"

        // Panorama classes applied to every line, space-separated. Empty = game default font.
        // Faces: stratum-{thin,light,regular,medium,bold,black}, add -italic or -condensed.
        // Monospace: stratum-{light,regular,bold}-mono, mono-spaced-font, mono-spaced-font-bold.
        // Effects stack: text-uppercase, text-letterspace-2px, text-shadow-basic.
        // Example: "stratum-bold text-uppercase text-shadow-basic"
        "HtmlFontFace"          ""

        // Text drawn just before the highlighted row. A single space hides the marker.
        "HtmlMarker"            "▶ "

        // Position counter "[n/m]" on the title line: color, and whether it shows.
        "HtmlCounterColor"      "#9aa0a6"
        "HtmlShowCounter"       "1"

        // Key-hint footer: text size (s/sm/m/ml/l) and whether it shows.
        "HtmlFooterSize"        "s"
        "HtmlShowFooter"        "1"

        // Suffix appended to items that open a submenu (a single space = none).
        "HtmlSubmenuSuffix"     " >"

        // Separator drawn between footer hint segments.
        "HtmlFooterSeparator"   " | "

        // Brackets around the position counter number (e.g. [3/8]).
        "HtmlCounterPrefix"     "["
        "HtmlCounterSuffix"     "]"

        // Recolor the highlighted row's text to HtmlNavColor (1),
        // or mark it with the marker only and keep the normal item color (0).
        "HtmlHighlightText"     "1"

        // Center-panel resend cadence. The panel decays, so it's re-sent while a menu is open.
        // KeepAlive must stay below DurationSecs or the panel can blink. Tune for bandwidth.
        "HtmlDurationSecs"      "3"
        "HtmlRefreshInterval"   "1.0"
        "HtmlKeepAlive"         "2.0"

        // HTML navigation keys (the player's in-game binds drive these).
        // Valid names: w a s d, e/use, shift/speed, ctrl/duck, space/jump,
        //              r/reload, mouse1/attack, mouse2/attack2, tab, f/inspect.
        // Unknown names keep the default. Footer hints update to match.
        // The cursor wraps around (past the last item returns to the first),
        // so setting NavUp (or NavDown) to "none" allows single-key scrolling.
        "NavUp"                 "w"      // move cursor up ("none" to disable)
        "NavDown"               "s"      // move cursor down ("none" to disable)
        "NavSelect"             "d"      // select highlighted item
        "NavBack"               "a"      // close / exit

        // Workaround for the HTML panel flashing.
		// WARNING: breaks warmup UI while a menu is shown, so it's off by default.
        // (1 = on, 0 = off)
        "HtmlFixFlashing"       "0"
    }

    // Optional per-player preferences, stored via sql_mm (must be loaded).
    // When Enabled is 1 and the connection succeeds, players can override the menu style (chat/html)
    // and their HTML navigation keys with "!menu" / mm_menu_prefs, persisted by SteamID.
    // The settings above become the defaults a player hasn't overridden.
    // A menu by a consumer plugin forced to a type ignores the player's style preference.
    "Database"
    {
        "Enabled"               "0"          // 1 to enable per-player preferences
        "Type"                  "sqlite"     // "sqlite" or "mysql"
        "Prefix"                "cs2menus"   // table is "<Prefix>_prefs"

        // SQLite: file path relative to the game dir (e.g. game/csgo/).
        "Path"                  "addons/cs2menus/cs2menus.db"

        // MySQL connection (used only when Type is "mysql").
        "Host"                  "localhost"
        "User"                  "root"
        "Pass"                  ""
        "Name"                  "cs2menus"
        "Port"                  "3306"
    }
}
