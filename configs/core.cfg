// CS2 Menu API - Configuration
// Place this file at: <game_root>/cfg/cs2menus/core.cfg
// Reloaded automatically on every map change.

"cs2menus"
{
    "General"
    {
        // Characters a player may type in front of a menu selection number.
        // Bare numbers always work; these let "!1" / "/1" select item 1 too.
        // CommandPrefix is for commands meant to stay visible in chat,
        // SilentCommandPrefix for ones that should be hidden.
        "CommandPrefix"         "!"
        "SilentCommandPrefix"   "/"
    }

    "Menu"
    {
        // Default render style for menus.
        //   "chat" - numbered list in chat, select by typing the number.
        //   "html" - center-screen HTML panel, navigate with movement keys.
        "DefaultType"           "chat"

        // Items shown per page in a chat menu (1-7).
        // The remaining keys are reserved: 8 = Next page, 9 = Previous page, 0 = Exit.
        "ItemsPerPage"          "7"

        // Default state of the "0. Exit" entry on new menus (1 = shown, 0 = hidden).
        // Consumers can still override this per-menu in code.
        "ExitButton"            "1"

        // --- HTML menus ---
        // Rows visible at once in an HTML menu (scrolling window, 1-6).
        "HtmlVisibleItems"      "7"

        // Hex colors for the HTML markup.
        "HtmlNavColor"          "#ff2ee7"  // highlighted/selected row + cursor
        "HtmlFooterColor"       "#909090"  // key-hint footer line
        "HtmlDisabledColor"     "#808080"  // greyed-out items

        // HTML navigation keys (the player's in-game binds drive these).
        // Valid names: w a s d, e/use, shift/speed, ctrl/duck, space/jump,
        //              r/reload, mouse1/attack, mouse2/attack2, tab.
        // Unknown names keep the default. Footer hints update to match.
        // The cursor wraps around (past the last item returns to the first),
        // so setting NavUp (or NavDown) to "none" allows single-key scrolling.
        "NavUp"                 "w"      // move cursor up ("none" to disable)
        "NavDown"               "s"      // move cursor down ("none" to disable)
        "NavSelect"             "d"      // select highlighted item
        "NavBack"               "a"      // close / exit

        // Workaround for the HTML panel flashing.
		// WARNING: breaks warmup UI while a menu is shown, so it's off by default.
        // (1 = on, 0 = off)
        "HtmlFixFlashing"       "0"
    }
}
